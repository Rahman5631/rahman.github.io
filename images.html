      <style>
        /* ===== همان متغیرها و استایل‌های اصلی سایت ===== */
        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --secondary: #FF6584;
            --accent: #00D2FF;
            --bg: #bfcdf7;
            --card-bg: #bfcdf7;
            --text: #1e1e2f;
            --text-light: #555;
            --shadow: 0 12px 30px rgba(108, 99, 255, 0.15);
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-header: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
            --gradient-btn: linear-gradient(135deg, #6C63FF, #00D2FF);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body.dark-mode {
            --bg: #12121a;
            --card-bg: #1e1e2a;
            --text: #eaeaf0;
            --text-light: #aaa;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(30, 30, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color var(--transition), color var(--transition);
            padding-top: 80px;
            line-height: 1.8;
        }

        a { text-decoration: none; color: inherit; }

        /* ===== Header ===== */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: var(--gradient-header); padding: 12px 20px;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .container1 {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1200px; margin: 0 auto;
        }
        .title {
            font-size: 1.3rem; font-weight: 700; color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2); letter-spacing: 1px;
        }
        .logo {
            width: 48px; height: 48px; object-fit: contain; border-radius: 50%;
            background: rgba(255,255,255,0); padding: 4px;
        }
        #toggleBtn {
            background: rgba(255,255,255,0); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0); border-radius: 50%;
            width: 44px; height: 44px; font-size: 24px; cursor: pointer;
            color: #585858; display: flex; align-items: center; justify-content: center;
        }
        .hamburger-menu { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger { width: 28px; height: 3px; background: #585858; border-radius: 6px; }

        .menu-popup {
            display: none; position: fixed; top: 80px; right: 16px;
            background: var(--card-bg); backdrop-filter: blur(20px); border-radius: var(--radius);
            padding: 20px; min-width: 200px; z-index: 999; opacity: 0;
            transition: all 0.3s; border: 1px solid var(--glass-border);
        }
        .menu-popup.show { display: block; opacity: 1; transform: translateY(0); }
        .menu-popup a {
            display: block; padding: 10px; margin: 4px 0; border-radius: 12px;
            font-weight: 600; color: var(--text);
        }
        .menu-popup a:hover { background: var(--primary); color: #fff; }

        nav {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px 20px;
            padding: 16px; background: var(--card-bg); margin: 8px 16px 0;
            border-radius: var(--radius); box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }
        nav a {
            font-weight: 600; color: var(--text-light); padding: 6px 12px;
            border-radius: 30px; transition: all 0.2s;
        }
        nav a:hover { color: var(--primary); background: rgba(108,99,255,0.08); }
        nav a.active { color: #fff; background: var(--primary); }

        /* ===== صفحه مقاله ===== */
        .article-container {
            max-width: 860px; margin: 20px auto; padding: 0 16px;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--glass-border);
            padding: 32px 24px;
        }

        .article-container h1 {
            font-size: 1.8rem; color: var(--primary); margin-bottom: 16px;
        }
        .article-container h2 {
            font-size: 1.3rem; color: var(--primary-dark); margin: 32px 0 12px;
            border-right: 4px solid var(--secondary); padding-right: 12px;
        }
        .article-container h3 {
            font-size: 1.1rem; color: var(--primary); margin: 20px 0 10px;
        }
        .article-container p {
            color: var(--text-light); margin-bottom: 16px; text-align: justify;
        }
        .article-container ul, .article-container ol {
            margin-right: 24px; margin-bottom: 20px; color: var(--text-light);
        }
        .article-container li { margin-bottom: 8px; }

        .spec-table {
            width: 100%; border-collapse: collapse; margin: 24px 0;
            background: var(--bg); border-radius: 12px; overflow: hidden;
        }
        .spec-table th, .spec-table td {
            padding: 12px 16px; text-align: right; border-bottom: 1px solid var(--glass-border);
        }
        .spec-table th {
            background: var(--gradient-header); color: #fff; font-weight: 700;
        }
        .spec-table td { color: var(--text-light); }

        .article-image {
            width: 100%; border-radius: 16px; margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* ===== فوتر ===== */
        footer {
            background: var(--card-bg); margin: 20px 16px; border-radius: var(--radius);
            padding: 20px; text-align: center; box-shadow: var(--shadow);
        }
        footer h2 { color: var(--primary); margin-bottom: 16px; }
        .social-icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .social-icons img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.08);
            padding: 6px;
            transition: transform 0.2s, background 0.2s;
        }
        .social-icons img:hover {
            transform: scale(1.1);
            background: rgba(108, 99, 255, 0.15);
        }
        footer small {
            color: var(--text-light);
            font-size: 0.85rem;
            display: block;
            margin-top: 8px;
        }

        /* دکمه شناور */
        .floating-button {
            position: fixed; bottom: 28px; right: 28px; width: 64px; height: 64px;
            border-radius: 50%; background: var(--gradient-btn); border: none;
            box-shadow: 0 8px 30px rgba(108,99,255,0.4); cursor: pointer;
            background-image: url('https://ahmadiservices.s3.ir-thr-at1.arvanstorage.ir/%DA%AF%D9%81%D8%AA%DA%AF%D9%88%20%D8%A2%D9%86%D9%84%D8%A7%DB%8C%D9%86.png?versionId=');
            background-size: 60%; background-position: center; background-repeat: no-repeat;
            animation: pulse 2s infinite; z-index: 998;
        }
        @keyframes pulse {
            0%,100%{ box-shadow: 0 8px 30px rgba(108,99,255,0.4); }
            50%{ box-shadow: 0 8px 50px rgba(108,99,255,0.7); }
        }

        .popup {
            display: none; position: fixed; bottom: 100px; right: 28px;
            background: var(--card-bg); backdrop-filter: blur(20px);
            border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow);
            z-index: 999;
        }
        .popup.show { display: block; }
        .popup img { width: 44px; height: 44px; border-radius: 50%; padding: 4px; }

        @media (max-width: 768px) {
            .hamburger-menu { display: flex; }
            nav { display: none; }
            .article-container h1 { font-size: 1.4rem; }
        }
    </style>
</head>

<script>
    // همان اسکریپت‌های تغییر تم و منو
    (function() {
        const toggleBtn = document.getElementById('toggleBtn');
        const iconSpan = document.getElementById('themeIcon');
        const saved = localStorage.getItem('theme') || 'light';
        if (saved === 'dark') { document.body.classList.add('dark-mode'); iconSpan.textContent = '☀'; }
        else { iconSpan.textContent = '☽'; }
        toggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            iconSpan.textContent = isDark ? '☀' : '☽';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    })();

    function toggleElement(id) {
        const el = document.getElementById(id);
        if (!el) return;
        if (el.classList.contains('show')) { el.classList.remove('show'); setTimeout(() => el.style.display = 'none', 250); }
        else { el.style.display = 'block'; requestAnimationFrame(() => el.classList.add('show')); }
    }
    function togglePopup() { toggleElement('socialPopup'); }
    function toggleMenu() { toggleElement('menuPopup'); }

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('menuPopup');
        const hamburger = document.querySelector('.hamburger-menu');
        const popup = document.getElementById('socialPopup');
        const floatBtn = document.querySelector('.floating-button');
        if (menu && !menu.contains(e.target) && !hamburger.contains(e.target)) {
            menu.classList.remove('show'); setTimeout(() => menu.style.display = 'none', 250);
        }
        if (popup && !popup.contains(e.target) && !floatBtn.contains(e.target)) {
            popup.classList.remove('show'); setTimeout(() => popup.style.display = 'none', 250);
        }
    });
</script>
